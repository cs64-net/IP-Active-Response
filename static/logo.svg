<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Cyber Membrane app icon">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e2450"/>
      <stop offset="100%" stop-color="#0a1022"/>
    </linearGradient>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="cGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#7a5cff"/>
    </linearGradient>
  </defs>

  <!-- Rounded app background -->
  <rect x="24" y="24" width="464" height="464" rx="108" fill="url(#bgGrad)"/>

  <!-- Shield -->
  <path d="M256 66
           L408 124
           V238
           C408 348 330 412 256 448
           C182 412 104 348 104 238
           V124 Z"
        fill="rgba(10,18,38,0.78)"/>

  <!-- Globe -->
  <g>
    <circle cx="256" cy="252" r="114"
            fill="rgba(230,237,255,0.07)"
            stroke="#f5f8ff"
            stroke-width="7"/>

    <!-- Latitudes -->
    <ellipse cx="256" cy="252" rx="114" ry="48" fill="none" stroke="rgba(245,248,255,0.58)" stroke-width="4.5"/>
    <ellipse cx="256" cy="252" rx="114" ry="84" fill="none" stroke="rgba(245,248,255,0.34)" stroke-width="4.5"/>
    <!-- Longitudes -->
    <ellipse cx="256" cy="252" rx="48" ry="114" fill="none" stroke="rgba(245,248,255,0.58)" stroke-width="4.5"/>
    <ellipse cx="256" cy="252" rx="84" ry="114" fill="none" stroke="rgba(245,248,255,0.34)" stroke-width="4.5"/>

    <!-- Circuits (bolder, simplified) -->
    <g stroke="url(#cGrad)" stroke-width="7" fill="none" stroke-linecap="round" filter="url(#softGlow)">
      <path d="M364 232 H420"/>
      <path d="M356 268 H428"/>
      <path d="M344 250 H384 V212 H432"/>
      <path d="M344 284 H378 V332 H424"/>
    </g>

    <!-- Nodes -->
    <circle cx="420" cy="232" r="8" fill="#00f0ff"/>
    <circle cx="428" cy="268" r="8" fill="#7a5cff"/>
    <circle cx="432" cy="212" r="8" fill="#ffffff"/>
    <circle cx="424" cy="332" r="8" fill="#00f0ff"/>

    <!-- CM (very readable at small sizes) -->
    <text x="256" y="285"
          text-anchor="middle"
          font-size="120"
          font-weight="950"
          font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
          fill="#ffffff"
          letter-spacing="6"
          paint-order="stroke"
          stroke="rgba(0,0,0,0.38)"
          stroke-width="12">CM</text>
  </g>

  <!-- subtle border -->
  <rect x="24" y="24" width="464" height="464" rx="108"
        fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="4"/>
</svg>
