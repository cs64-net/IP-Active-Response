{% extends "base.html" %}

{% block title %}Login - SOC IP Blocker{% endblock %}

{% block navbar %}{% endblock %}

{% block extra_head %}
<style>
    body {
        background: linear-gradient(135deg, #0f1117 0%, #1a1d2e 50%, #0f1117 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .main-content { width: 100%; }
    .login-card {
        background: rgba(24, 27, 35, 0.85);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 1.25rem;
        box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .login-icon {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
        font-size: 2rem;
        color: #fff;
        box-shadow: 0 8px 30px rgba(99, 102, 241, 0.3);
    }
    .form-floating > .form-control {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 0.75rem;
    }
    .form-floating > .form-control:focus {
        background: rgba(255,255,255,0.06);
        border-color: #6366f1;
        box-shadow: 0 0 0 0.2rem rgba(99, 102, 241, 0.2);
    }
    .btn-login {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border: none;
        border-radius: 0.75rem;
        padding: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .btn-login:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35);
    }
    .app-footer { display: none; }
</style>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-11 col-sm-8 col-md-5 col-lg-4 col-xl-3">
        <div class="login-card p-4 p-md-5">
            <div class="login-icon">
                <i class="bi bi-shield-lock"></i>
            </div>
            <h4 class="text-center mb-1 fw-bold">SOC IP Blocker</h4>
            <p class="text-center text-body-secondary mb-4">Sign in to continue</p>
            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="username" name="username" placeholder="Username" required>
                    <label for="username">Username</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                    <label for="password">Password</label>
                </div>
                <button type="submit" class="btn btn-login btn-primary w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Login
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
