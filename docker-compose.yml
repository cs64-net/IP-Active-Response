services:
  active-ip-defence:
    build: .
    container_name: active-ip-defence
    ports:
      - "8000:5000"
    volumes:
      - soc-data:/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_PATH=/data/soc_ip_blocker.db
    restart: unless-stopped

volumes:
  soc-data:
